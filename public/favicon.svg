<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Flashcards">
  <rect width="64" height="64" rx="14" fill="#0d211b" />

  <!-- fanned cards, back to front -->
  <g transform="rotate(-26 32 58)">
    <rect x="21" y="17" width="22" height="30" rx="3.5" fill="#c8862f" stroke="#0d211b" stroke-width="2" />
  </g>
  <g transform="rotate(26 32 58)">
    <rect x="21" y="17" width="22" height="30" rx="3.5" fill="#6bb3a0" stroke="#0d211b" stroke-width="2" />
  </g>

  <!-- front card: paper, with a topic tag and two lines of question -->
  <rect x="21" y="17" width="22" height="30" rx="3.5" fill="#f4f1e6" stroke="#0d211b" stroke-width="2" />
  <rect x="25" y="22" width="8" height="3" rx="1.5" fill="#c8862f" />
  <rect x="25" y="30" width="14" height="3" rx="1.5" fill="#17211d" opacity=".7" />
  <rect x="25" y="36" width="9" height="3" rx="1.5" fill="#17211d" opacity=".45" />
</svg>
