  <text x="250" y="360" text-anchor="middle" fill="#185FA5" font-size="12">Blue region = all fraction-allowed answers (the easy LP)</text>
  <text x="250" y="378" text-anchor="middle" fill="#0F6E56" font-size="12">Green dots = valid whole-number answers</text>
  <text x="470" y="66" fill="#791F1F" font-size="14" font-weight="500">Fractional</text>
  <text x="470" y="82" fill="#791F1F" font-size="14" font-weight="500">LP optimum</text>
  <line x1="466" y1="70" x2="262" y2="66" stroke="#73726c" stroke-width="0.5" stroke-dasharray="3 3"/>
  <text x="470" y="150" fill="#A32D2D" font-size="14" font-weight="500">The cut (scissors)</text>
  <text x="470" y="168" fill="#A32D2D" font-size="12">slices off the red dot,</text>
  <text x="470" y="184" fill="#A32D2D" font-size="12">keeps every green dot</text>
</svg>
