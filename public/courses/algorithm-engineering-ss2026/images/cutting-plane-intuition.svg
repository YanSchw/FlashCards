<svg xmlns="http://www.w3.org/2000/svg" width="680" height="400" viewBox="0 0 680 400" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="680" height="400" fill="#ffffff"/>
  <polygon points="90,320 90,110 250,60 430,120 430,320" fill="#E6F1FB" stroke="#185FA5" stroke-width="1"/>
  <circle cx="130" cy="290" r="4" fill="#1D9E75"/><circle cx="190" cy="290" r="4" fill="#1D9E75"/><circle cx="250" cy="290" r="4" fill="#1D9E75"/><circle cx="310" cy="290" r="4" fill="#1D9E75"/><circle cx="370" cy="290" r="4" fill="#1D9E75"/>
  <circle cx="130" cy="230" r="4" fill="#1D9E75"/><circle cx="190" cy="230" r="4" fill="#1D9E75"/><circle cx="250" cy="230" r="4" fill="#1D9E75"/><circle cx="310" cy="230" r="4" fill="#1D9E75"/><circle cx="370" cy="230" r="4" fill="#1D9E75"/>
  <circle cx="130" cy="170" r="4" fill="#1D9E75"/><circle cx="190" cy="170" r="4" fill="#1D9E75"/><circle cx="250" cy="170" r="4" fill="#1D9E75"/><circle cx="310" cy="170" r="4" fill="#1D9E75"/>
  <circle cx="250" cy="66" r="6" fill="#E24B4A" stroke="#791F1F" stroke-width="1"/>
